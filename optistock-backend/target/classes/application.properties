spring.application.name=optistock-backend

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto_ev03?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=8080

# CORS — Orígenes del frontend (VS Code Live Server)
cors.allowed-origins=http://127.0.0.1:5500,http://localhost:5500
cors.allow-credentials=true

# JWT
jwt.secret=${JWT_SECRET:esta_es_una_clave_muy_segura_de_32_caracteres_o_mas_12345}
jwt.expiration=86400000

# LOGGING
logging.level.root=INFO
logging.level.com.optistock=DEBUG

# Archivo de logs persistente
logging.file.name=logs/optistock.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7