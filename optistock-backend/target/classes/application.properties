spring.application.name=optistock-backend

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto_ev03?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Puerto
server.port=8080

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080,https://tudominio.com
cors.allow-credentials=true
