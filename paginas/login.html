<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | OptiStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #1e40af;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: rgba(37, 99, 235, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: auto;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
            z-index: 10;
            min-height: auto;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease;
        }

        .brand h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2.25rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
        }

        /* Tabs Header */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Forms Switch */
        .form-wrapper {
            position: relative;
            min-height: auto;
        }

        .form-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-content.active {
            display: block;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        /* Password Show Toggle */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: var(--transition);
        }

        .password-toggle:hover {
            color: var(--text-main);
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            padding: 0.95rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Notifications & Error messages */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
            font-weight: 500;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1.5px solid rgba(239, 68, 68, 0.4);
            color: #fecaca;
            animation: slideInDown 0.3s ease;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1.5px solid rgba(16, 185, 129, 0.4);
            color: #86efac;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Keyframes Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive - Tablets y Pantallas Pequeñas */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .card {
                padding: 2rem 1.75rem;
                border-radius: 20px;
            }

            .brand h1 {
                font-size: 2rem;
            }

            .brand p {
                font-size: 0.9rem;
            }

            .brand {
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .tab-btn {
                padding: 0.65rem;
                font-size: 0.85rem;
            }

            .form-control {
                padding: 0.75rem 0.9rem;
                font-size: 0.9rem;
            }

            .btn-submit {
                padding: 0.85rem;
                font-size: 0.95rem;
                margin-top: 0.75rem;
            }
        }

        /* Responsive - Teléfonos */
        @media (max-width: 480px) {
            body {
                padding: 0.75rem;
            }

            .container {
                padding: 0.5rem;
                max-width: 100%;
            }

            .card {
                padding: 1.75rem 1.5rem;
                border-radius: 18px;
            }

            .brand {
                margin-bottom: 1.25rem;
            }

            .brand h1 {
                font-size: 1.75rem;
                letter-spacing: -0.3px;
            }

            .brand p {
                font-size: 0.85rem;
            }

            .tabs {
                margin-bottom: 1.5rem;
                padding: 3px;
            }

            .tab-btn {
                padding: 0.6rem;
                font-size: 0.8rem;
                border-radius: 6px;
            }

            .form-group {
                margin-bottom: 0.9rem;
            }

            .form-group label {
                font-size: 0.8rem;
                margin-bottom: 0.4rem;
            }

            .form-control {
                padding: 0.7rem 0.85rem;
                font-size: 0.9rem;
                border-radius: 10px;
            }

            .btn-submit {
                padding: 0.8rem;
                font-size: 0.9rem;
                margin-top: 0.65rem;
                border-radius: 10px;
            }

            .alert {
                padding: 0.65rem 0.9rem;
                font-size: 0.85rem;
                margin-bottom: 1.25rem;
            }

            .password-toggle {
                right: 10px;
                font-size: 1rem;
            }
        }

        /* Responsive - Pantallas muy pequeñas (máximo 360px) */
        @media (max-width: 360px) {
            .container {
                padding: 0.25rem;
            }

            .card {
                padding: 1.5rem 1.25rem;
            }

            .brand h1 {
                font-size: 1.5rem;
            }

            .brand p {
                font-size: 0.8rem;
            }

            .form-group {
                margin-bottom: 0.8rem;
            }

            .tab-btn {
                padding: 0.5rem;
                font-size: 0.75rem;
            }

            .form-control {
                padding: 0.65rem 0.75rem;
                font-size: 0.85rem;
            }

            .btn-submit {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
        }

        /* Landscape mode - ajustes */
        @media (max-height: 600px) and (orientation: landscape) {
            .brand {
                margin-bottom: 1rem;
            }

            .brand h1 {
                font-size: 1.75rem;
            }

            .card {
                padding: 1.5rem;
            }

            .form-group {
                margin-bottom: 0.75rem;
            }

            .btn-submit {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand">
            <h1>OptiStock</h1>
            <p>Gestión de Inventario y Facturación</p>
        </div>

        <div class="card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Ingresar</button>
                <button class="tab-btn" id="tab-register-btn" onclick="switchTab('register')">Crear Cuenta</button>
            </div>

            <!-- Global Alert -->
            <div id="alert-box" class="alert"></div>

            <div class="form-wrapper">
                <!-- FORM LOGIN -->
                <div id="form-login" class="form-content active">
                    <form id="login-form" onsubmit="handleLoginSubmit(event)">
                        <div class="form-group">
                            <label for="login-username">Usuario (Login)</label>
                            <input type="text" id="login-username" class="form-control" placeholder="Ej: admin" required
                                autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="login-password">Contraseña</label>
                            <div class="input-container">
                                <input type="password" id="login-password" class="form-control" placeholder="••••••••"
                                    required autocomplete="current-password">
                                <button type="button" class="password-toggle"
                                    onclick="togglePassword('login-password')">&#128065;</button>
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">Iniciar Sesión</button>
                    </form>
                </div>

                <!-- FORM REGISTRO -->
                <div id="form-register" class="form-content">
                    <form id="register-form" onsubmit="handleRegisterSubmit(event)">
                        <div class="form-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 140px;">
                                <label for="reg-nombre">Nombre</label>
                                <input type="text" id="reg-nombre" class="form-control" placeholder="Juan" required>
                            </div>
                            <div style="flex: 1; min-width: 140px;">
                                <label for="reg-apellido">Apellido</label>
                                <input type="text" id="reg-apellido" class="form-control" placeholder="Pérez" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-username">Usuario (Login)</label>
                            <input type="text" id="reg-username" class="form-control" placeholder="admin" required
                                autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Contraseña</label>
                            <div class="input-container">
                                <input type="password" id="reg-password" class="form-control"
                                    placeholder="Mín. 5 caracteres" required autocomplete="new-password">
                                <button type="button" class="password-toggle"
                                    onclick="togglePassword('reg-password')">&#128065;</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-rol">Rol asignado</label>
                            <select id="reg-rol" class="form-control" style="background-color: #1e1b4b;" required>
                                <option value="1">ADMIN (Completo)</option>
                                <option value="2">VENDEDOR (Facturas y Clientes)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-submit"
                            style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);">Crear
                            Cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts importados -->
    <script src="../js/datos.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
